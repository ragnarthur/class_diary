{% extends 'base.html' %}

{% block content %}
    <h2 class="mb-4">Marcar Presença para {{ aluno.nome }}</h2>
    <form method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        <input type="hidden" name="data" value="{{ data }}">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" name="presente">
            <label class="form-check-label">Presente</label>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{% url 'turma_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
