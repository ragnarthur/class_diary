{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="mb-4">
        <h2 class="text-center">Desempenho de Faltas e Presenças</h2>
    </div>
    <table class="table table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>Turma</th>
                <th>Aluno</th>
                <th>Total de Presenças</th>
                <th>Total de Faltas</th>
            </tr>
        </thead>
        <tbody>
            {% for item in desempenho %}
                <tr>
                    <td>{{ item.turma }}</td>
                    <td>{{ item.aluno }}</td>
                    <td>{{ item.total_presencas }}</td>
                    <td>{{ item.total_faltas }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
