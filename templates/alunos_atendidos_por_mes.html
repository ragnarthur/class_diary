{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="mb-4">
        <h2 class="text-center">Alunos Atendidos por Mês</h2>
        <h4 class="text-center mt-3">Período: {{ start_date }} a {{ end_date }}</h4>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h4>Turma Matutina</h4>
                </div>
                <div class="card-body">
                    <p>Total de Alunos Atendidos: {{ atendidos_matutina }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header">
                    <h4>Turma Vespertina</h4>
                </div>
                <div class="card-body">
                    <p>Total de Alunos Atendidos: {{ atendidos_vespertina }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
